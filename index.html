<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PUBG ASUKA 联络站</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* 弹窗动画 */
        #wechat-modal { transition: opacity 0.3s ease; }
        .modal-content { transform: scale(0.9); transition: transform 0.3s ease; }
        #wechat-modal.flex { display: flex; }
        #wechat-modal.active .modal-content { transform: scale(1); }
    </style>
</head>
<body class="bg-slate-950 text-white font-sans flex items-center justify-center min-h-screen">

    <div class="max-w-md w-full px-6 py-12 bg-slate-900 border border-slate-800 rounded-3xl shadow-2xl text-center">
        <h1 class="text-4xl font-black mb-2 tracking-tight">PUBG <span class="text-cyan-400">ASUKA</span></h1>
        <p class="text-slate-400 mb-10 text-sm italic">请选择你想要的联系方式：</p>
        
        <div class="flex flex-col gap-5">
            <a href="https://wa.me/60179872271" target="_blank" rel="noopener noreferrer" 
               class="flex items-center justify-center gap-3 px-8 py-4 bg-green-600 hover:bg-green-500 rounded-2xl font-bold text-lg transition-all hover:scale-105 active:scale-95 shadow-lg shadow-green-900/40">
               <span>WhatsApp</span>
            </a>

            <a href="https://discord.gg/Sagn9YSXSB" target="_blank" rel="noopener noreferrer" 
               class="flex items-center justify-center gap-3 px-8 py-4 bg-indigo-600 hover:bg-indigo-500 rounded-2xl font-bold text-lg transition-all hover:scale-105 active:scale-95 shadow-lg shadow-indigo-900/40">
               <span>Discord</span>
            </a>

            <button onclick="toggleModal()" 
               class="flex items-center justify-center gap-3 px-8 py-4 bg-emerald-500 hover:bg-emerald-400 rounded-2xl font-bold text-lg transition-all hover:scale-105 active:scale-95 shadow-lg shadow-emerald-900/40 text-white">
               <span>WeChat (微信群)</span>
            </button>
        </div>

        <p class="mt-10 text-slate-600 text-xs">© 2026 Powered by Vercel</p>
    </div>

    <div id="wechat-modal" onclick="toggleModal()" class="hidden fixed inset-0 z-50 bg-black/80 backdrop-blur-sm items-center justify-center p-6 cursor-pointer">
        <div class="modal-content bg-white p-4 rounded-3xl max-w-xs w-full shadow-2xl" onclick="event.stopPropagation()">
            <img src="wechat-qr.png" alt="WeChat QR" class="w-full rounded-2xl">
            <p class="text-slate-900 font-bold mt-4 text-center">长按识别或扫码进群</p>
            <button onclick="toggleModal()" class="mt-4 w-full py-2 text-slate-400 text-sm hover:text-slate-600">点击空白处关闭</button>
        </div>
    </div>

    <script>
        function toggleModal() {
            const modal = document.getElementById('wechat-modal');
            if (modal.classList.contains('hidden')) {
                modal.classList.remove('hidden');
                modal.classList.add('flex');
                setTimeout(() => modal.classList.add('active'), 10);
            } else {
                modal.classList.remove('active');
                setTimeout(() => {
                    modal.classList.remove('flex');
                    modal.classList.add('hidden');
                }, 300);
            }
        }
    </script>
</body>
</html>
